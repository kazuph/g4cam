<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gemma 4 Camera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    #camera-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas { display: none; }

    /* === TOP: status area === */
    #top-area {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 20;
      pointer-events: none;
    }

    #status {
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 13px;
      transition: opacity 0.3s;
    }

    #countdown {
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 13px;
      display: none;
    }

    /* === BOTTOM: controls + result === */
    #bottom-area {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
    }

    #next-focus {
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      padding: 4px 0;
      display: none;
    }

    #mode-toggle {
      display: none;
      margin: 0 auto 8px;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      background: rgba(0,150,255,0.8);
      padding: 10px 24px;
      border-radius: 22px;
      cursor: pointer;
      text-align: center;
      width: fit-content;
    }

    #mode-toggle.running {
      background: rgba(255,60,60,0.8);
      font-size: 12px;
      padding: 8px 18px;
    }

    #overlay {
      padding: 16px 20px 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      color: #fff;
      font-size: 17px;
      line-height: 1.5;
      min-height: 60px;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #overlay.empty { opacity: 0; }

    /* === Dark mode === */
    #dark-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      opacity: 0;
      transition: opacity 1s;
      pointer-events: none;
      z-index: 5;
    }

    #dark-overlay.active { opacity: 1; }

    #emoji-display {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 80px;
      z-index: 15;
      display: none;
      pointer-events: none;
    }

    #ai-glow {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 6;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #ai-glow.active {
      opacity: 1;
      animation: glowBreath 3s ease-in-out infinite alternate;
    }

    /* 上下左右それぞれの辺から内側に向かってフェード */
    #ai-glow .g-top,
    #ai-glow .g-bottom,
    #ai-glow .g-left,
    #ai-glow .g-right { position: absolute; }

    #ai-glow .g-top {
      top: 0; left: 0; right: 0; height: 100%;
      background: linear-gradient(to bottom,
        rgba(188,130,243,0.7) 0%,
        rgba(245,185,234,0.3) 3%,
        rgba(188,130,243,0.1) 8%,
        rgba(188,130,243,0.02) 15%,
        transparent 25%
      );
    }
    #ai-glow .g-bottom {
      bottom: 0; left: 0; right: 0; height: 100%;
      background: linear-gradient(to top,
        rgba(56,182,255,0.7) 0%,
        rgba(141,159,255,0.3) 3%,
        rgba(170,110,238,0.1) 8%,
        rgba(141,159,255,0.02) 15%,
        transparent 25%
      );
    }
    #ai-glow .g-left {
      top: 0; left: 0; bottom: 0; width: 100%;
      background: linear-gradient(to right,
        rgba(255,80,100,0.65) 0%,
        rgba(255,150,80,0.25) 3%,
        rgba(255,103,120,0.08) 8%,
        rgba(255,103,120,0.01) 15%,
        transparent 22%
      );
    }
    #ai-glow .g-right {
      top: 0; right: 0; bottom: 0; width: 100%;
      background: linear-gradient(to left,
        rgba(255,200,80,0.65) 0%,
        rgba(255,130,200,0.25) 3%,
        rgba(188,130,243,0.08) 8%,
        rgba(255,186,113,0.01) 15%,
        transparent 22%
      );
    }

    @keyframes glowBreath {
      0% { opacity: 0.85; }
      100% { opacity: 1; }
    }

    #flash {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }

    #flash.active { opacity: 1; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="dark-overlay"></div>
    <div id="emoji-display"></div>
    <div id="ai-glow">
      <div class="g-top"></div>
      <div class="g-bottom"></div>
      <div class="g-left"></div>
      <div class="g-right"></div>
    </div>
    <div id="flash"></div>

    <!-- TOP: status -->
    <div id="top-area">
      <div id="status">カメラを起動中...</div>
      <div id="countdown"></div>
    </div>

    <!-- BOTTOM: controls + result -->
    <div id="bottom-area">
      <div id="next-focus"></div>
      <div id="mode-toggle">開始</div>
      <div id="overlay" class="empty"></div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const statusEl = document.getElementById('status');
    const modeToggle = document.getElementById('mode-toggle');
    const flash = document.getElementById('flash');
    const countdownEl = document.getElementById('countdown');
    const darkOverlay = document.getElementById('dark-overlay');
    const emojiDisplay = document.getElementById('emoji-display');
    const nextFocusEl = document.getElementById('next-focus');
    const aiGlow = document.getElementById('ai-glow');

    let analyzing = false;
    let cameraReady = false;
    let autoMode = false;
    let countdown = 0;
    let countdownInterval = null;
    let darkTimeout = null;

    const PROMPT = '絵文字1つ＋この画像の説明を1文で。文字が見えたら必ず読む。日本語で短く。';

    // Extract emoji from text
    function extractEmoji(text) {
      const emojiRegex = /[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu;
      const emojis = text.match(emojiRegex);
      return emojis ? emojis.join('') : '👀';
    }

    function goDark(emoji) {
      video.style.visibility = 'hidden';
      darkOverlay.classList.add('active');
      emojiDisplay.textContent = emoji;
      emojiDisplay.style.display = 'block';
    }

    function goLight() {
      clearTimeout(darkTimeout);
      video.style.visibility = 'visible';
      darkOverlay.classList.remove('active');
      emojiDisplay.style.display = 'none';
    }

    // TTS - unlock on first user gesture, then speak freely
    let ttsUnlocked = false;

    function unlockTTS() {
      if (ttsUnlocked) return;
      const dummy = new SpeechSynthesisUtterance('');
      dummy.volume = 0;
      speechSynthesis.speak(dummy);
      ttsUnlocked = true;
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'ja-JP';
      utter.rate = 1.2;
      speechSynthesis.speak(utter);
    }

    // Camera
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        cameraReady = true;
        statusEl.textContent = '準備完了';
        modeToggle.style.display = 'block';
        setTimeout(() => { statusEl.style.opacity = '0'; }, 2000);
      } catch (err) {
        statusEl.textContent = 'カメラエラー: ' + err.message;
      }
    }

    function captureFrame() {
      // Resize to max 512px for faster upload & inference
      const maxDim = 512;
      let w = video.videoWidth;
      let h = video.videoHeight;
      if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
      else { w = Math.round(w * maxDim / h); h = maxDim; }
      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(video, 0, 0, w, h);
      return canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
    }

    function flashEffect() {
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 150);
    }

    // Analyze
    async function analyze() {
      if (analyzing || !cameraReady) return;
      analyzing = true;

      goLight();
      flashEffect();
      aiGlow.classList.add('active');
      statusEl.style.opacity = '1';
      statusEl.innerHTML = '<span class="spinner"></span>解析中...';

      try {
        const image = captureFrame();
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image, prompt: PROMPT }),
        });

        if (!res.ok) {
          const err = await res.json();
          overlay.textContent = 'エラー: ' + (err.error || 'unknown');
          overlay.classList.remove('empty');
        } else {
          // Stream response
          let fullText = '';
          overlay.textContent = '';
          overlay.classList.remove('empty');

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const d = JSON.parse(line.slice(6));
                if (d.text) {
                  fullText += d.text;
                  overlay.textContent = fullText;
                }
              } catch {}
            }
          }

          if (fullText) {
            speak(fullText);
            if (autoMode) {
              const emoji = extractEmoji(fullText);
              darkTimeout = setTimeout(() => goDark(emoji), 10000);
            }
          }
        }
      } catch (err) {
        overlay.textContent = '通信エラー: ' + err.message;
        overlay.classList.remove('empty');
      } finally {
        aiGlow.classList.remove('active');
        analyzing = false;
        if (autoMode) {
          statusEl.textContent = 'オート解析中';
          startCountdown();
        } else {
          statusEl.style.opacity = '0';
        }
      }
    }

    // Countdown
    function startCountdown() {
      countdown = 10;
      countdownEl.style.display = 'block';
      countdownEl.textContent = `${countdown}s`;
      clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          clearInterval(countdownInterval);
          countdownEl.textContent = '📸';
          analyze();
        } else {
          countdownEl.textContent = `${countdown}s`;
        }
      }, 1000);
    }

    function stopCountdown() {
      clearInterval(countdownInterval);
      countdownEl.style.display = 'none';
    }

    // Toggle
    function toggleAutoMode() {
      autoMode = !autoMode;
      if (autoMode) {
        modeToggle.textContent = '⏹ 停止';
        modeToggle.classList.add('running');
        analyze();
      } else {
        modeToggle.textContent = '▶ 開始';
        modeToggle.classList.remove('running');
        stopCountdown();
        goLight();
        nextFocusEl.style.display = 'none';
        statusEl.style.opacity = '0';
        speechSynthesis.cancel();
      }
    }

    modeToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      unlockTTS();
      toggleAutoMode();
    });

    startCamera();
  </script>
</body>
</html>
